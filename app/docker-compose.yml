services:
  app:
    build:
      context: .
      dockerfile: Dockerfile
      args:
        NODE_HEAP_MB: "768"
    image: button-tien-ich:production
    container_name: button-tien-ich
    ports:
      - "3030:3030"
    environment:
      NODE_ENV: production
      NEXT_TELEMETRY_DISABLED: "1"
      HOSTNAME: 0.0.0.0
      PORT: "3030"
      # Ensure data directories exist with write permissions
      DATA_DIR: /app/src/data
    volumes:
      - ./src/data:/app/src/data
      - ./public/uploads:/app/public/uploads
    restart: unless-stopped
    mem_limit: 768m
    memswap_limit: 768m
    cpus: 0.75